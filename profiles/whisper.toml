# Zylaxion Acoustic Profile: Whisper
# Extremely quiet, short decay, minimal resonance.
# For libraries, meetings, and shared spaces.

[profile]

[profile.click]
frequency = 5500.0    # Hz — high, tiny click
resonance = 0.8       # Q factor — minimal ring
duration_ms = 0.8    # ms — very short
amplitude = 0.15      # barely audible

[profile.spring]
frequency = 2500.0    # Hz
resonance = 0.5       # Q factor — almost none
mix = 0.2             # minimal spring

[profile.decay]
coefficient = 0.9985         # fast decay (~60 ms)
voice_off_threshold = 0.001   # aggressive cutoff
