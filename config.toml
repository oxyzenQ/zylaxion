# Zylaxion Central Configuration
# =============================================================================
#
# This is the single source of truth for all acoustic DSP parameters.
# The file defines multiple named presets; the active one is selected
# via the `tuning` key below OR overridden by `--preset <name>` on the
# CLI.
#
# -----------------------------------------------------------------------------
# USAGE
# -----------------------------------------------------------------------------
#
# Option A — set the active preset in this file:
#   Edit `tuning = "technical"` below, save. Done.
#   zylaxion start                    # uses preset.tuning
#   zylaxion daemon                   # uses preset.tuning
#
# Option B — override from CLI (takes precedence over tuning):
#   zylaxion start --preset cherryMX
#   zylaxion daemon --preset classic
#
# List available presets:
#   zylaxion list-presets
#
# Validate the config before applying:
#   zylaxion testconf
#
# Edit, save, and the running daemon (or foreground `start`) will pick
# up changes within 1 second — no restart needed. If you change
# `tuning = "cherryMX"` and save, the watcher swaps to cherryMX
# automatically (unless --preset was passed on the CLI, in which case
# the CLI value wins and tuning changes are ignored).
#
# -----------------------------------------------------------------------------
# SEARCH PATH (first found wins)
# -----------------------------------------------------------------------------
#
#   1. ~/.config/zylaxion/config.toml          (user-local override)
#   2. /etc/zylaxion/config.toml               (system config)
#   3. /usr/local/share/zylaxion/config.toml   (FHS installed default)
#   4. ./config.toml                            (relative to CWD, for dev)
#   5. Hardcoded default                        (always available)
#
# -----------------------------------------------------------------------------
# ADDING A NEW PRESET
# -----------------------------------------------------------------------------
#
# 1. Copy any existing [preset.NAME] block below.
# 2. Rename the table to your new preset name (e.g. [preset.mycherry]).
# 3. Tweak the parameters to taste. Respect the documented Min/Max ranges.
# 4. Save the file.
# 5. Activate it by setting `tuning = "mycherry"` above, or use
#    `zylaxion start --preset mycherry`.
#
# -----------------------------------------------------------------------------
# PER-KEY OVERRIDES
# -----------------------------------------------------------------------------
#
# Each preset table can include an optional `[[preset.NAME.keys]]` array
# of per-scancode overrides. Unspecified parameters inherit from the
# preset's values. Example:
#
# [preset.technical]
# [preset.technical.click]
# frequency = 4500.0
# # ...
#
# [[preset.technical.keys]]
# scancode = 28  # Enter
# [preset.technical.keys.click]
# frequency = 3000.0  # deeper thump for Enter only
#
# =============================================================================

# Active preset name. Change this to switch the default sound character.
# Override from CLI with: zylaxion start --preset <name>
# If the named preset does not exist below, the program will error and
# exit — there is NO silent fallback.
[preset]
tuning = "technical"

# ─────────────────────────────────────────────────────────────────────────────
# Preset: technical (default)
# Crisp, loud, punchy — best for Cherry MX Blue / clicky switches.
# ─────────────────────────────────────────────────────────────────────────────
[preset.technical]

[preset.technical.click]
# Click frequency in Hertz. Controls the pitch of the key click.
# Range: 500.0 - 8000.0
frequency = 4500.0

# Quality factor (Q) of the click bandpass filter. Higher values produce
# a narrower, more resonant click with longer ring-out.
# Range: 0.1 - 10.0
resonance = 2.0

# Duration of the noise excitation burst in milliseconds. Shorter values
# produce a sharper transient; longer values a softer attack.
# Range: 0.1 - 10.0
duration_ms = 1.5

# Peak amplitude of the click transient.
# Range: 0.0 - 1.0
amplitude = 0.8

[preset.technical.spring]
# Spring/housing resonance frequency in Hertz. Lower values produce a
# deeper, warmer spring ring; higher values a brighter, tinnier ring.
# Range: 500.0 - 8000.0
frequency = 1800.0

# Quality factor (Q) of the spring bandpass filter. Higher values produce
# longer, more pronounced ringing.
# Range: 0.1 - 10.0
resonance = 3.5

# Mix level of the spring component in the final output. 0.0 = click
# only, 1.0 = spring only.
# Range: 0.0 - 1.0
mix = 0.6

[preset.technical.decay]
# Per-sample multiplicative decay factor applied to the envelope.
# WARNING: MUST be less than 1.0. Values >= 1.0 cause infinite loops
# (voice never deactivates, consuming a polyphony slot forever).
# Range: 0.0 - 0.9999
# Approximate -60 dB decay time at 44100 Hz:
#   0.9994 ≈ 180 ms, 0.9990 ≈ 110 ms, 0.9997 ≈ 280 ms
coefficient = 0.9994

# Amplitude threshold below which the voice is deactivated. Smaller
# values let voices ring longer; larger values cut them off sooner.
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.00001


# ─────────────────────────────────────────────────────────────────────────────
# Preset: cherryMX
# Balanced reference Cherry MX sound — clicky but not harsh. Good default
# for general mechanical keyboards (MX Blue / MX Brown).
# ─────────────────────────────────────────────────────────────────────────────
[preset.cherryMX]

[preset.cherryMX.click]
# Range: 500.0 - 8000.0
frequency = 4200.0
# Range: 0.1 - 10.0
resonance = 2.2
# Range: 0.1 - 10.0
duration_ms = 1.8
# Range: 0.0 - 1.0
amplitude = 0.75

[preset.cherryMX.spring]
# Range: 500.0 - 8000.0
frequency = 1900.0
# Range: 0.1 - 10.0
resonance = 3.0
# Range: 0.0 - 1.0
mix = 0.55

[preset.cherryMX.decay]
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9995
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.00001


# ─────────────────────────────────────────────────────────────────────────────
# Preset: classic
# Deeper, more resonant — like old bucklespring keyboards.
# Best for Cherry MX Brown / tactile switches.
# ─────────────────────────────────────────────────────────────────────────────
[preset.classic]

[preset.classic.click]
# Range: 500.0 - 8000.0
frequency = 3200.0
# Range: 0.1 - 10.0
resonance = 2.5
# Range: 0.1 - 10.0
duration_ms = 2.5
# Range: 0.0 - 1.0
amplitude = 0.7

[preset.classic.spring]
# Range: 500.0 - 8000.0
frequency = 1200.0
# Range: 0.1 - 10.0
resonance = 4.0
# Range: 0.0 - 1.0
mix = 0.75

[preset.classic.decay]
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9992
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.00001


# ─────────────────────────────────────────────────────────────────────────────
# Preset: studio
# Softer attack, longer decay — studio-monitor feel.
# Best for quiet office environments with Cherry MX Red / linear switches.
# ─────────────────────────────────────────────────────────────────────────────
[preset.studio]

[preset.studio.click]
# Range: 500.0 - 8000.0
frequency = 4000.0
# Range: 0.1 - 10.0
resonance = 1.2
# Range: 0.1 - 10.0
duration_ms = 2.0
# Range: 0.0 - 1.0
amplitude = 0.5

[preset.studio.spring]
# Range: 500.0 - 8000.0
frequency = 2200.0
# Range: 0.1 - 10.0
resonance = 2.0
# Range: 0.0 - 1.0
mix = 0.5

[preset.studio.decay]
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9997
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.00001


# ─────────────────────────────────────────────────────────────────────────────
# Preset: elegant
# Very soft, muffled, polite — for quiet environments.
# Best for low-profile or scissor-switch keyboards.
# ─────────────────────────────────────────────────────────────────────────────
[preset.elegant]

[preset.elegant.click]
# Range: 500.0 - 8000.0
frequency = 3000.0
# Range: 0.1 - 10.0
resonance = 1.5
# Range: 0.1 - 10.0
duration_ms = 3.0
# Range: 0.0 - 1.0
amplitude = 0.35

[preset.elegant.spring]
# Range: 500.0 - 8000.0
frequency = 1500.0
# Range: 0.1 - 10.0
resonance = 2.5
# Range: 0.0 - 1.0
mix = 0.4

[preset.elegant.decay]
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9991
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.0001


# ─────────────────────────────────────────────────────────────────────────────
# Preset: whisper
# Extremely quiet, short decay, minimal resonance.
# For libraries, meetings, and shared spaces.
# ─────────────────────────────────────────────────────────────────────────────
[preset.whisper]

[preset.whisper.click]
# Range: 500.0 - 8000.0
frequency = 5500.0
# Range: 0.1 - 10.0
resonance = 0.8
# Range: 0.1 - 10.0
duration_ms = 0.8
# Range: 0.0 - 1.0
amplitude = 0.15

[preset.whisper.spring]
# Range: 500.0 - 8000.0
frequency = 2500.0
# Range: 0.1 - 10.0
resonance = 0.5
# Range: 0.0 - 1.0
mix = 0.2

[preset.whisper.decay]
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9985
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.001
