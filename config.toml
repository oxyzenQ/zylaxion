# v4.2.0: 3rd DSP layer — the deep "thock" of the keycap
# hitting the switch housing / PCB at bottom-out.
# Range: 100.0 - 1000.0
frequency = 800.0
# Range: 0.1 - 10.0
resonance = 1.2
# Range: 0.0 - 1.0
mix = 0.05




# ─────────────────────────────────────────────────────────────────────────────
# Preset: retro_typewriter
# Sharp strike, long mid-frequency ring, no spring. Like an old
# mechanical typewriter without the bell — the typebar hitting
# the platen plus the cast-iron frame resonance.
# ─────────────────────────────────────────────────────────────────────────────
[preset.retro_typewriter]

[preset.retro_typewriter.click]
# Mid frequency — the typebar strike against the platen.
# Range: 500.0 - 8000.0
frequency = 2500.0
# Mid-high resonance — the typebar rings briefly.
# Range: 0.1 - 10.0
resonance = 4.0
# Short attack — typebar strike is fast.
# Range: 0.1 - 10.0
duration_ms = 1.0
# Strong amplitude — typewriters are LOUD.
# Range: 0.0 - 1.0
amplitude = 0.85

[preset.retro_typewriter.spring]
# Mid frequency — the cast-iron frame resonance (NOT a spring —
# typewriters don't have springs in the audio path, but we use the
# spring DSP block to model the frame ring).
# Range: 500.0 - 8000.0
frequency = 1500.0
# High resonance — cast iron rings for a long time.
# Range: 0.1 - 10.0
resonance = 5.5
# High mix — the frame ring is half the typewriter character.
# Range: 0.0 - 1.0
mix = 0.7

[preset.retro_typewriter.decay]
# Long decay (~250 ms) — cast iron frame rings out.
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9996
# Low threshold — let the ring fade naturally.
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.000005

[preset.retro_typewriter.ambient]
# High rattle — typewriters have lots of moving parts that rattle.
enabled = true
# Range: 0.0 - 1.0
noise_level = 0.20
# Medium-slow decay.
# Range: 0.0 - 0.9999 (MUST be < 1.0)
noise_decay = 0.985
[preset.retro_typewriter.housing]
# Low-mid freq, high resonance, mid mix — cast-iron frame impact.
# v4.2.0: 3rd DSP layer — the deep "thock" of the keycap
# hitting the switch housing / PCB at bottom-out.
# Range: 100.0 - 1000.0
frequency = 280.0
# Range: 0.1 - 10.0
resonance = 4.0
# Range: 0.0 - 1.0
mix = 0.5




# ─────────────────────────────────────────────────────────────────────────────
# Preset: neon_pulse
# Mid-frequency, heavy ambient rattle, synthesized feel. Cyberpunk
# vibe — like a holographic UI button press with synthesized
# feedback. Heavily textured, almost granular.
# ─────────────────────────────────────────────────────────────────────────────
[preset.neon_pulse]

[preset.neon_pulse.click]
# Mid frequency — the synthesized "pulse" tone.
# Range: 500.0 - 8000.0
frequency = 3300.0
# Mid-high resonance — tuned, but not as pure as glass.
# Range: 0.1 - 10.0
resonance = 3.5
# Short attack — UI feedback is immediate.
# Range: 0.1 - 10.0
duration_ms = 1.4
# Moderate amplitude.
# Range: 0.0 - 1.0
amplitude = 0.7

[preset.neon_pulse.spring]
# Mid frequency — the synthesized harmonic.
# Range: 500.0 - 8000.0
frequency = 2700.0
# Mid resonance.
# Range: 0.1 - 10.0
resonance = 3.0
# Moderate mix.
# Range: 0.0 - 1.0
mix = 0.55

[preset.neon_pulse.decay]
# Medium decay (~200 ms).
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.9994
# Low threshold.
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.00001

[preset.neon_pulse.ambient]
# VERY high rattle — the "synthesized" character comes from heavy
# granular texture on top of the click. This is what gives neon_pulse
# its cyberpunk feel — without the heavy ambient, it just sounds
# like a generic click.
enabled = true
# Range: 0.0 - 1.0
noise_level = 0.35
# Medium decay — the texture sustains alongside the click.
# Range: 0.0 - 0.9999 (MUST be < 1.0)
noise_decay = 0.987
[preset.neon_pulse.housing]
# Mid freq, mid-high resonance, mid mix — synthesized UI body.
# v4.2.0: 3rd DSP layer — the deep "thock" of the keycap
# hitting the switch housing / PCB at bottom-out.
# Range: 100.0 - 1000.0
frequency = 450.0
# Range: 0.1 - 10.0
resonance = 2.5
# Range: 0.0 - 1.0
mix = 0.4


