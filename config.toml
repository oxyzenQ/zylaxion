# ═══════════════════════════════════════════════════════════════════════════════
# v4.0.0 — Legendary Keyboard Series
# ═══════════════════════════════════════════════════════════════════════════════
#
# The following 10 presets are tuned to mimic the acoustic signature
# of real legendary mechanical keyboard switches. Each was hand-tuned
# by ear against reference recordings of the actual hardware, then
# adjusted to fit within the engine's DSP parameter ranges.
#
# Switch type taxonomy used below:
#
#   buckling-spring   = IBM Model M / F style — metal spring buckles
#                       against a pivot, producing a sharp metallic
#                       ping plus deep housing resonance.
#   electrocapacitive = Topre — rubber dome over a conical spring,
#                       sensed capacitively. Deep, rounded "thock"
#                       with almost no click component.
#   linear            = Cherry MX Black/Red/Silver — smooth travel,
#                       no tactile bump, no click jacket. The sound
#                       is dominated by bottom-out "thud" + spring
#                       ping at the bottom of travel.
#   tactile           = Cherry MX Brown/Clear, Zealios — has a
#                       tactile bump mid-travel but no audible click
#                       jacket. Sound is a soft "thock" with a brief
#                       mid-frequency transient.
#   clicky            = Cherry MX Blue — has both a tactile bump AND
#                       a click jacket that produces a sharp high-
#                       frequency ping.
#
# Decay coefficient reference (at 44100 Hz, voice_off_threshold = 1e-5):
#   0.9985 ≈  70 ms (very short — encoder detents, whisper presets)
#   0.9990 ≈ 110 ms (short — linear switches, fast bottom-out)
#   0.9992 ≈ 150 ms (medium — tactile switches, modern keyboards)
#   0.9994 ≈ 180 ms (medium-long — clicky switches, classic Cherry MX)
#   0.9996 ≈ 240 ms (long — sharp buckling springs, ALPS SKCM)
#   0.9997 ≈ 280 ms (very long — full buckling-spring ring-out)


# ─────────────────────────────────────────────────────────────────────────────
# Preset: ibm_model_m
# The iconic buckling-spring keyboard. Deep, very resonant, long ring.
# A sharp metallic ping sits on top of a deep plastic-housing ring.
# This is the showcase preset for v4.0.0 — the default `tuning` value.
# ─────────────────────────────────────────────────────────────────────────────
[preset.ibm_model_m]

[preset.ibm_model_m.click]
# Mid-frequency ping — the buckling spring hitting the pivot plate.
# Range: 500.0 - 8000.0
frequency = 2200.0
# High resonance — Model M's ping is sharply tuned.
# Range: 0.1 - 10.0
resonance = 5.5
# Short attack — the spring buckle is a fast mechanical event.
# Range: 0.1 - 10.0
duration_ms = 1.2
# Strong amplitude — Model M is LOUD.
# Range: 0.0 - 1.0
amplitude = 0.85

[preset.ibm_model_m.spring]
# Very low spring frequency — the deep plastic housing ring.
# Range: 500.0 - 8000.0
frequency = 850.0
# Very high resonance — the housing rings like a bell. v4.1.0: bumped
# from 6.5 to 7.5 to better match the sustained metallic ping of a
# real Model M.
# Range: 0.1 - 10.0
resonance = 7.5
# High mix — the housing ring is the dominant character of a Model M.
# Range: 0.0 - 1.0
mix = 0.85

[preset.ibm_model_m.decay]
# Long decay — the housing ring sustains for ~300 ms. v4.1.0: bumped
# from 0.9997 to 0.99975 to let the ping ring out another ~20 ms.
# Range: 0.0 - 0.9999 (MUST be < 1.0)
coefficient = 0.99975
# Very low threshold — let the ring fade naturally.
# Range: 1e-7 - 1e-2
voice_off_threshold = 0.000001

[preset.ibm_model_m.ambient]
# Master enable for the ambient case-rattle path.
enabled = true
# Moderate rattle — the case is thick ABS, rattles a bit.
# Range: 0.0 - 1.0
noise_level = 0.20
# Medium-slow decay — the rattle fades over ~170 ms. v4.1.0: lowered
# from 0.985 to 0.983 so the case rattle rings out a touch longer
# (real Model M cases have audible rattle for ~150-180 ms).
# Range: 0.0 - 0.9999 (MUST be < 1.0)
noise_decay = 0.983
[preset.ibm_model_m.housing]
# Mid housing freq for the Model M's case resonance.
# v4.2.0: 3rd DSP layer — the deep "thock" of the keycap
# hitting the switch housing / PCB at bottom-out.
# Range: 100.0 - 1000.0
frequency = 400.0
# Range: 0.1 - 10.0
resonance = 3.0
# Range: 0.0 - 1.0
mix = 0.4




# ─────────────────────────────────────────────────────────────────────────────
# Preset: topre
# Electrocapacitive switches (Realforce / HHKB). Deep "thock", smooth,
# very low resonance — almost no click component. The signature sound
# of high-end Japanese keyboards.
# ─────────────────────────────────────────────────────────────────────────────
[preset.topre]

[preset.topre.click]
# Very low frequency — the "thock" sits in the 600-800 Hz range.
# v4.1.0: lowered from 700 to 650 to better match the deep, rounded
# thock of a Realforce/HHKB. Real Topre thock fundamentals are
# typically 500-700 Hz (the rubber dome's natural resonance).
# Range: 500.0 - 8000.0
frequency = 650.0
# Very low resonance — thock is broad, not tuned.
# Range: 0.1 - 10.0
resonance = 0.6
# Long duration — soft, rounded attack (rubber dome compresses slowly).
# v4.1.0: bumped from 4.5 to 5.5 for an even softer attack. Real
# Topre domes compress over ~5-7 ms because the conical spring
# absorbs some of the actuation force before the dome collapses.
# Range: 0.1 - 10.0
duration_ms = 5.5
# Moderate amplitude — Topre is quieter than buckling-spring.
