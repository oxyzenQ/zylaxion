name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

# The default GITHUB_TOKEN cannot create releases unless we explicitly
# grant `contents: write`. Without this, softprops/action-gh-release@v2
# fails with HTTP 403 "Resource not accessible by integration".
# Placing the block at the workflow level (rather than per-job) keeps
# the declaration co-located with the trigger and matches the pattern
# already used in maintenance.yml.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libinput-dev libudev-dev pkg-config

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/zylaxion
          generate_release_notes: true
