---
name: Release

"on":
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64-gnu
            install_musl: false
          - target: x86_64-unknown-linux-musl
            archive_suffix: linux-amd64-musl
            install_musl: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup default stable && rustup target add ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libinput-dev libudev-dev pkg-config

      - name: Install musl tools (musl build only)
        if: ${{ matrix.install_musl }}
        run: sudo apt-get install -y -qq musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking (musl only)
        if: ${{ matrix.install_musl }}
        run: |
          file target/${{ matrix.target }}/release/zylaxion
          ldd target/${{ matrix.target }}/release/zylaxion \
            || echo "Static binary (no dynamic deps)"

      - name: Package release artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          STAGE="zylaxion-${TAG}-${{ matrix.archive_suffix }}"
          rm -rf "$STAGE" "$STAGE.tar.gz"*
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/zylaxion "$STAGE/zylaxion"
          tar -czf "$STAGE.tar.gz" "$STAGE"

          # Checksums: SHA-512 (classical) + BLAKE2b-512 + SHAKE256 (quantum-resistant)
          sha512sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha512sum"
          b2sum "$STAGE.tar.gz" > "$STAGE.tar.gz.b2sum"
          HASH=$(openssl dgst -shake256 "$STAGE.tar.gz" | awk -F'= ' '{print $2}')
          echo "${HASH}  $STAGE.tar.gz" > "$STAGE.tar.gz.shake256"

          ls -l "$STAGE.tar.gz" "$STAGE.tar.gz.sha512sum" "$STAGE.tar.gz.b2sum" "$STAGE.tar.gz.shake256"
          echo "--- checksum contents ---"
          cat "$STAGE.tar.gz.sha512sum"
          cat "$STAGE.tar.gz.b2sum"
          cat "$STAGE.tar.gz.shake256"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        env:
          TAG: ${{ github.ref_name }}
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz.sha512sum
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz.b2sum
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz.shake256
