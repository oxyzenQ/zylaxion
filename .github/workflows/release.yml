---
name: Release

"on":
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

# The default GITHUB_TOKEN cannot create releases unless we explicitly
# grant `contents: write`. Without this, softprops/action-gh-release@v2
# fails with HTTP 403 "Resource not accessible by integration".
# Placing the block at the workflow level (rather than per-job) keeps
# the declaration co-located with the trigger and matches the pattern
# already used in maintenance.yml.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libinput-dev libudev-dev pkg-config

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Stage the bare binary into a clean directory so the tarball
          # expands to a single top-level `zylaxion-<tag>-linux-amd64/`
          # directory containing just the binary — no `target/` noise.
          STAGE="zylaxion-${TAG}-linux-amd64"
          rm -rf "$STAGE" "$STAGE.tar.gz" "$STAGE.tar.gz.sha512sum"
          mkdir -p "$STAGE"
          cp target/release/zylaxion "$STAGE/zylaxion"

          # Tarball preserves the executable bit (tar stores file modes).
          tar -czf "$STAGE.tar.gz" "$STAGE"

          # SHA-512 checksum file. The format matches `sha512sum(1)`:
          # `<hash>  <filename>` (two spaces, filename relative). This
          # Users can verify it with `sha512sum -c`.
          sha512sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha512sum"

          # Surface the artifacts in the CI log for quick inspection.
          ls -l "$STAGE.tar.gz" "$STAGE.tar.gz.sha512sum"
          echo "--- checksum contents ---"
          cat "$STAGE.tar.gz.sha512sum"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        env:
          TAG: ${{ github.ref_name }}
        with:
          files: |
            zylaxion-${{ env.TAG }}-linux-amd64.tar.gz
            zylaxion-${{ env.TAG }}-linux-amd64.tar.gz.sha512sum
          body: |
            ## zylaxion ${{ github.ref_name }}

            Real-time mechanical keyboard acoustic synthesizer for Linux.

            ### Install
            ```bash
            archive="zylaxion-${{ github.ref_name }}-linux-amd64.tar.gz"
            tar xzf "$archive"
            sudo install -Dm755 \
              "${archive%.tar.gz}/zylaxion" \
              /usr/local/bin/zylaxion
            zylaxion --version
            ```

            ### What's new
            See
            [CHANGELOG.md](https://github.com/oxyzenQ/zylaxion/blob/main/CHANGELOG.md)

            ### Verify
            ```bash
            sha512sum -c \
              zylaxion-${{ github.ref_name }}-linux-amd64.tar.gz.sha512sum
            ```

