---
name: Release

"on":
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # NOTE: zylaxion ships only the gnu (glibc) target — no musl static build.
    # The cpal audio crate depends on alsa-sys, which requires pkg-config with
    # cross-compilation support. ALSA has no musl static variant on Ubuntu
    # runners (libasound2-dev is glibc-only), so musl cross-compile fails with
    # "pkg-config has not been configured to support cross-compilation".
    # A "musl" binary that still links libasound dynamically wouldn't be truly
    # static anyway — defeating the purpose. Audio apps fundamentally need the
    # host's ALSA library at runtime regardless of libc choice.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup default stable && rustup target add ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libinput-dev libudev-dev pkg-config

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary
        run: |
          file target/${{ matrix.target }}/release/zylaxion
          ldd target/${{ matrix.target }}/release/zylaxion || true

      - name: Package release artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          STAGE="zylaxion-${TAG}-${{ matrix.archive_suffix }}"
          rm -rf "$STAGE" "$STAGE.tar.gz"*
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/zylaxion "$STAGE/zylaxion"
          tar -czf "$STAGE.tar.gz" "$STAGE"

          # Checksums: SHA-512 (classical) + BLAKE2b-512 + SHAKE256 (quantum-resistant)
          sha512sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha512sum"
          b2sum "$STAGE.tar.gz" > "$STAGE.tar.gz.b2sum"
          # SHAKE256 via Python (cross-platform, consistent 64-byte output)
          python3 -c "
          import hashlib
          data = open('$STAGE.tar.gz', 'rb').read()
          h = hashlib.shake_256(data).hexdigest(64)
          print(f'{h}  $STAGE.tar.gz')
          " > "$STAGE.tar.gz.shake256"

          ls -l "$STAGE.tar.gz" "$STAGE.tar.gz.sha512sum" "$STAGE.tar.gz.b2sum" "$STAGE.tar.gz.shake256"
          echo "--- checksum contents ---"
          cat "$STAGE.tar.gz.sha512sum"
          cat "$STAGE.tar.gz.b2sum"
          cat "$STAGE.tar.gz.shake256"

      - name: Generate release body
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          {
            if [ -n "$PREV_TAG" ]; then
              echo "## What's Changed"
              echo ""
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..${GITHUB_REF_NAME}"
              echo ""
            else
              echo "Initial release."
            fi
          } > release-body.md
          echo "=== Release body ==="
          cat release-body.md

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        env:
          TAG: ${{ github.ref_name }}
        with:
          body_path: release-body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz.sha512sum
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz.b2sum
            zylaxion-${{ env.TAG }}-${{ matrix.archive_suffix }}.tar.gz.shake256
