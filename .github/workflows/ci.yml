---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect core file changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            HEAD="${{ github.sha }}"
          fi
          FILES=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git ls-files)
          if echo "$FILES" | grep -qE '\.(rs|toml)$|Cargo\.lock$|^build\.rs$|^rust-toolchain|^scripts/|^\.cargo/'; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          else
            echo "core=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libinput-dev libudev-dev pkg-config

      - name: Install Rust toolchain
        run: rustup default stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  workflow_quality:
    name: Workflow lint + codespell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install workflow lint tools
        run: |
          python3 -m pip install --user yamllint codespell
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml

      - name: Run yamllint
        run: yamllint .github/workflows

      - name: Run codespell
        run: |
          if [ -f .codespellrc ]; then
            codespell --config .codespellrc .
          else
            codespell --skip './.git,./target,./assets,./dist,./node_modules' .
          fi
