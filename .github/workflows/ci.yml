---
name: CI

"on":
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libinput-dev libudev-dev pkg-config

      - name: Install Rust toolchain
        run: rustup default stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

  workflow_quality:
    name: Workflow lint + codespell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install workflow lint tools
        run: |
          python3 -m pip install --user yamllint codespell
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml

      - name: Run yamllint
        run: yamllint .github/workflows

      - name: Run codespell
        run: |
          if [ -f .codespellrc ]; then
            codespell --config .codespellrc .
          else
            codespell --skip './.git,./target,./assets,./dist,./node_modules' .
          fi
